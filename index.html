<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Session with Alex Martin</title>
  <meta name="description" content="Schedule a session with Alex Martin">
  <meta property="og:title" content="Book a Session with Alex Martin">
  <meta property="og:description" content="Schedule a session with Alex Martin">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fb;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 64px 20px 0;
      animation: fadeDown 0.6s ease-out;
    }

    header h1 {
      font-size: 44px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -1.5px;
    }

    .divider {
      width: 90px;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 2px;
      margin: 28px auto 44px;
      animation: fadeDown 0.6s ease-out 0.1s both;
    }

    .calendar-container {
      width: 100%;
      max-width: 750px;
      flex: 1;
      padding: 0 16px 60px;
      animation: fadeUp 0.6s ease-out 0.2s both;
    }

    .calendly-inline-widget {
      min-width: 320px;
      height: 700px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      background: #fff;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      header { padding: 44px 16px 0; }
      header h1 { font-size: 30px; }
      .divider { margin: 20px auto 28px; }
      .calendly-inline-widget { height: 650px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Book a Session with Alex</h1>
  </header>

  <div class="divider"></div>

  <div class="calendar-container">
    <div class="calendly-inline-widget" data-url="https://calendly.com/readysms/alex15min?hide_gdpr_banner=1&hide_event_type_details=1&background_color=ffffff&primary_color=3b82f6"></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
  </div>
</body>
</html>
